<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Football Tactics Board</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Tactics"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="icon-192.png"/>
  <link rel="apple-touch-icon" sizes="167x167" href="icon-192.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{height:100%;height:-webkit-fill-available;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;height:100dvh;height:-webkit-fill-available;overflow:hidden;touch-action:none;
      padding-top:env(safe-area-inset-top);
      padding-left:env(safe-area-inset-left);
      padding-right:env(safe-area-inset-right);}
    #tab-bar-spacer{height:env(safe-area-inset-bottom);background:#0d1b2e;flex-shrink:0;order:3;}

    /* ── TABS ── */
    #tab-bar{display:flex;background:#0d1b2e;border-top:1px solid #1e3a5f;flex-shrink:0;order:2;}
    .tab-btn{flex:1;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:#556;cursor:pointer;transition:color .2s;font-size:10px;font-weight:600;letter-spacing:.3px;}
    .tab-btn svg{width:22px;height:22px;fill:currentColor;}
    .tab-btn.active{color:#4ade80;}
    .tab-btn.active svg{fill:#4ade80;}

    /* ── MAIN AREA ── */
    #main{flex:1;overflow:hidden;display:flex;flex-direction:column;order:1;min-height:0;}
    .tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
    .tab-panel.active{display:flex;}

    /* ═══ PITCH TAB ═══ */
    #pitch-topbar{background:#0d1b2e;padding:6px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;border-bottom:1px solid #1e3a5f;flex-wrap:wrap;}
    #pitch-topbar h1{font-size:13px;font-weight:700;color:#4ade80;flex:1;white-space:nowrap;}

    .tb-select{font-size:11px;padding:5px 7px;border-radius:8px;border:1px solid #1e3a5f;background:#16213e;color:#fff;cursor:pointer;}
    .tb-btn{font-size:11px;padding:5px 9px;border-radius:8px;border:1px solid #1e3a5f;background:#16213e;color:#fff;cursor:pointer;font-weight:600;white-space:nowrap;}
    .tb-btn.active,.tb-btn:active{background:#4ade80;color:#000;border-color:#4ade80;}

    .token-toggle{display:flex;background:#16213e;border-radius:8px;overflow:hidden;border:1px solid #1e3a5f;}
    .tt-btn{font-size:10px;padding:5px 7px;background:none;border:none;color:#aaa;cursor:pointer;font-weight:600;}
    .tt-btn.active{background:#4ade80;color:#000;}

    /* pitch wrapper */
    #pitch-area{flex:1;display:flex;flex-direction:row;gap:0;overflow:hidden;min-height:0;}

    /* bench sidebar */
    #bench-sidebar{width:48px;background:#0d1b2e;border-right:1px solid #1e3a5f;display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:6px;overflow-y:auto;flex-shrink:0;}
    #bench-sidebar .bench-label{font-size:8px;color:#556;writing-mode:horizontal-tb;text-align:center;letter-spacing:.5px;font-weight:700;margin-bottom:2px;}
    .bench-token{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,0.2);flex-shrink:0;cursor:grab;text-shadow:0 1px 2px rgba(0,0,0,0.8);user-select:none;}

    #pitch-wrap{flex:1;position:relative;overflow:hidden;display:flex;justify-content:center;align-items:center;}
    #pitch{position:relative;background:#2d7a1b;overflow:hidden;}
    #pitch.opp-hidden .opp-player{display:none;}

    #pitch::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0.06) 0,rgba(0,0,0,0.06) 38px,transparent 38px,transparent 76px);pointer-events:none;z-index:0;}
    #pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;}

    /* player token */
    .player{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;transform:translate(-50%,-50%);z-index:10;gap:2px;}
    .player:active{cursor:grabbing;z-index:100;}
    .player-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.8);border:2.5px solid rgba(255,255,255,0.35);flex-shrink:0;}
    .player-name-label{font-size:7px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,1);background:rgba(0,0,0,0.5);border-radius:3px;padding:1px 3px;white-space:nowrap;max-width:48px;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}

    /* ball */
    .ball-token{position:absolute;transform:translate(-50%,-50%);z-index:15;cursor:grab;user-select:none;}
    .ball-token:active{cursor:grabbing;z-index:100;}

    /* ═══ PLAYERS TAB ═══ */
    #players-panel{display:flex;flex-direction:column;overflow:hidden;min-height:0;}
    #players-topbar{background:#0d1b2e;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e3a5f;flex-shrink:0;}
    #players-topbar h2{font-size:14px;font-weight:700;color:#fff;}
    #add-player-fab{background:#4ade80;color:#000;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;}
    #players-list{flex:1;overflow-y:auto;padding:8px;}
    .player-row{background:#16213e;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;border:1px solid #1e3a5f;}
    .player-row.unavailable{opacity:.4;}
    .player-avail{width:18px;height:18px;border-radius:5px;border:2px solid #4ade80;background:none;cursor:pointer;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;}
    .player-avail.checked{background:#4ade80;}
    .player-avail.checked::after{content:'✓';color:#000;font-size:11px;font-weight:700;line-height:1;}
    .player-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
    .player-info{flex:1;min-width:0;}
    .player-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .player-meta{font-size:10px;color:#778;margin-top:1px;}
    .player-order{display:flex;flex-direction:column;gap:2px;}
    .order-btn{background:#0f2744;border:1px solid #1e3a5f;color:#aaa;width:22px;height:18px;border-radius:4px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
    .edit-btn{background:none;border:1px solid #1e3a5f;color:#aaa;padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;}
    .del-btn{background:none;border:1px solid #3a1a1a;color:#e74c3c;padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;}
    .player-badge{font-size:8px;background:#1e3a5f;color:#4ade80;border-radius:4px;padding:2px 5px;font-weight:700;}

    /* ═══ SETTINGS TAB ═══ */
    #settings-panel{overflow-y:auto;padding:12px;}
    .settings-section{background:#16213e;border-radius:12px;padding:12px 14px;margin-bottom:10px;border:1px solid #1e3a5f;}
    .settings-section h3{font-size:12px;font-weight:700;color:#4ade80;margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase;}
    .setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .setting-row:last-child{margin-bottom:0;}
    .setting-label{font-size:13px;color:#ccc;}
    .color-swatch{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);cursor:pointer;position:relative;overflow:hidden;}
    .color-swatch input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .setting-select{font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid #1e3a5f;background:#0d1b2e;color:#fff;}

    /* ═══ MODAL ═══ */
    #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;justify-content:center;align-items:flex-end;}
    #modal-overlay.open{display:flex;}
    #modal{background:#16213e;border-radius:18px 18px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto;border-top:1px solid #1e3a5f;}
    #modal h2{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;}
    .modal-field{margin-bottom:12px;}
    .modal-field label{font-size:11px;color:#aaa;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
    .modal-field input,.modal-field select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #1e3a5f;background:#0d1b2e;color:#fff;font-size:14px;}
    .modal-actions{display:flex;gap:8px;margin-top:16px;}
    .modal-actions button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
    #modal-save{background:#4ade80;color:#000;}
    #modal-cancel{background:#0d1b2e;color:#fff;}
    #modal-delete{background:#e74c3c;color:#fff;}

    /* scrollbars */
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px;}
  </style>
</head>
<body>

<!-- MAIN CONTENT -->
<div id="main">

  <!-- ══ PITCH TAB ══ -->
  <div class="tab-panel active" id="panel-pitch">
    <div id="pitch-topbar">
      <h1>⚽ Tactics</h1>
      <select class="tb-select" id="format-select">
        <option value="5">5-a-side</option>

    </div>
    <div id="pitch-area">
      <div id="bench-sidebar">
        <div class="bench-label">BENCH</div>

        <div id="pitch">
          <svg id="pitch-svg" viewBox="0 0 100 160" preserveAspectRatio="none">

            <line x1="5" y1="80" x2="95" y2="80" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>

            <circle cx="50" cy="80" r="0.9" fill="rgba(255,255,255,0.65)"/>
            <rect x="22" y="4" width="56" height="22" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <rect x="35" y="4" width="30" height="9" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <rect x="40" y="1.5" width="20" height="4" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="0.9"/>
            <circle cx="50" cy="20" r="0.9" fill="rgba(255,255,255,0.65)"/>
            <path d="M38 26 A12 12 0 0 1 62 26" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <rect x="22" y="134" width="56" height="22" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <rect x="35" y="147" width="30" height="9" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <rect x="40" y="154.5" width="20" height="4" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="0.9"/>
            <circle cx="50" cy="140" r="0.9" fill="rgba(255,255,255,0.65)"/>
            <path d="M38 134 A12 12 0 0 0 62 134" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <path d="M5 8 A4 4 0 0 1 9 4" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <path d="M91 4 A4 4 0 0 1 95 8" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <path d="M5 152 A4 4 0 0 0 9 156" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
            <path d="M91 156 A4 4 0 0 0 95 152" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.8"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ PLAYERS TAB ══ -->
  <div class="tab-panel" id="panel-players">
    <div id="players-topbar">
      <h2>Team Roster</h2>
      <button id="add-player-fab">+ Add Player</button>
    </div>
    <div id="players-list"></div>
  </div>

  <!-- ══ SETTINGS TAB ══ -->
  <div class="tab-panel" id="panel-settings">
    <div id="settings-panel">
      <div class="settings-section">
        <h3>Team Colours</h3>
        <div class="setting-row">
          <span class="setting-label">My team colour</span>
          <div class="color-swatch" id="sw-my"><input type="color" id="cp-my" value="#f9ca24"/></div>
        </div>
        <div class="setting-row">
          <span class="setting-label">My GK colour</span>
          <div class="color-swatch" id="sw-mygk"><input type="color" id="cp-mygk" value="#00b894"/></div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Opposition colour</span>
          <div class="color-swatch" id="sw-opp"><input type="color" id="cp-opp" value="#e74c3c"/></div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Opp GK colour</span>
          <div class="color-swatch" id="sw-oppgk"><input type="color" id="cp-oppgk" value="#0984e3"/></div>
        </div>
      </div>
      <div class="settings-section">
        <h3>Pitch &amp; Ball</h3>
        <div class="setting-row">
          <span class="setting-label">Pitch colour</span>
          <div class="color-swatch" id="sw-pitch"><input type="color" id="cp-pitch" value="#2d7a1b"/></div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Ball colour</span>
          <div class="color-swatch" id="sw-ball"><input type="color" id="cp-ball" value="#ffffff"/></div>
        </div>
      </div>
      <div class="settings-section">
        <h3>Token Size</h3>
        <div class="setting-row">
          <span class="setting-label">Player token size</span>
          <select class="setting-select" id="token-size-select">
            <option value="28">Small</option>
            <option value="34" selected>Medium</option>
            <option value="40">Large</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <h3>About</h3>
        <div class="setting-row"><span class="setting-label" style="color:#556;font-size:12px;">Football Tactics Board v2.0 — drag players to set positions, use bench tokens to swap in subs.</span></div>
      </div>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div id="tab-bar">
  <button class="tab-btn active" data-tab="pitch">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    Pitch
  </button>
  <button class="tab-btn" data-tab="players">
    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>

  </button>
  <button class="tab-btn" data-tab="settings">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    Settings
  </button>
</div>
<div id="tab-bar-spacer"></div>

<!-- PLAYER MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">Add Player</h2>
    <div class="modal-field">
      <label>Full Name</label>
      <input type="text" id="modal-name" placeholder="e.g. Marcus Johnson"/>
    </div>
    <div class="modal-field">
      <label>Position</label>
      <select id="modal-position">
        <option value="GK">Goalkeeper</option>
        <option value="DEF">Defender</option>
        <option value="MID">Midfielder</option>
        <option value="FWD" selected>Forward</option>
        <option value="WB">Wing Back</option>
        <option value="CAM">CAM</option>
        <option value="CDM">CDM</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Shirt Number</label>
      <input type="number" id="modal-number" placeholder="1–99" min="1" max="99"/>
    </div>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-delete" style="display:none">Delete</button>
      <button id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const POSITIONS = ['GK','DEF','MID','FWD','WB','CAM','CDM'];

let settings = {
  myColor:'#f9ca24', myGkColor:'#00b894',
  oppColor:'#e74c3c', oppGkColor:'#0984e3',
  pitchColor:'#2d7a1b', ballColor:'#ffffff',
  tokenSize: 34
};

let players = []; // {id,name,position,number,available}
let format  = 11;
let tokenMode = 'initials'; // initials | number | position
let showMode  = 'both';     // both | mine

let ballPos = {x:50,y:50};
let pitchPlayerPositions = {}; // id -> {x,y}
let oppPositions = []; // [{x,y}]

let editingPlayerId = null;

const defaultFormations = {
  5:  {my:[[50,12],[25,35],[75,35],[35,58],[65,58]],                        opp:[[50,88],[25,65],[75,65],[35,42],[65,42]]},
  7:  {my:[[50,8],[22,28],[50,26],[78,28],[28,48],[50,46],[72,48]],          opp:[[50,92],[22,72],[50,74],[78,72],[28,52],[50,54],[72,52]]},
  9:  {my:[[50,8],[18,25],[50,22],[82,25],[25,40],[50,37],[75,40],[33,55],[67,55]], opp:[[50,92],[18,75],[50,78],[82,75],[25,60],[50,63],[75,60],[33,45],[67,45]]},
  11: {my:[[50,6],[18,18],[36,16],[64,16],[82,18],[24,34],[50,30],[76,34],[30,48],[50,45],[70,48]], opp:[[50,94],[18,82],[36,84],[64,84],[82,82],[24,66],[50,70],[76,66],[30,52],[50,55],[70,52]]}
};

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function uid(){ return Math.random().toString(36).slice(2,9); }

function initials(name){
  if(!name||!name.trim()) return '?';
  const p = name.trim().split(/\s+/);
  if(p.length===1) return p[0].slice(0,2).toUpperCase();
  return (p[0][0]+p[p.length-1][0]).toUpperCase();
}

function tokenLabel(player, isGK){
  if(tokenMode==='initials') return initials(player.name);
  if(tokenMode==='number')   return player.number ? String(player.number) : initials(player.name);
  if(tokenMode==='position') return isGK ? 'GK' : (player.position || '?');
  return initials(player.name);
}

function shadeColor(hex,pct){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,Math.max(0,(n>>16)+pct));
  const g=Math.min(255,Math.max(0,((n>>8)&0xff)+pct));
  const b=Math.min(255,Math.max(0,(n&0xff)+pct));
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

// ─────────────────────────────────────────
// PITCH SIZING
// ─────────────────────────────────────────
function sizePitch(){
  const wrap = document.getElementById('pitch-wrap');
  const pitch = document.getElementById('pitch');
  const wr = wrap.getBoundingClientRect();
  const ASPECT = 160/100;
  let w = wr.width, h = wr.height;
  if(h/w > ASPECT){ w = h/ASPECT; } else { h = w*ASPECT; }
  pitch.style.width  = w+'px';
  pitch.style.height = h+'px';
}

window.addEventListener('resize', ()=>{ sizePitch(); renderPitch(); });

// ─────────────────────────────────────────
// PITCH RENDER
// ─────────────────────────────────────────
function getAvailablePlayers(){
  return players.filter(p=>p.available);
}

function renderPitch(){
  const pitch = document.getElementById('pitch');
  pitch.style.backgroundColor = settings.pitchColor;

  // Remove old tokens (not SVG)
  pitch.querySelectorAll('.player,.ball-token').forEach(e=>e.remove());

  const available = getAvailablePlayers();
  const onPitch   = available.slice(0, format);
  const bench     = available.slice(format);

  const sz = settings.tokenSize;
  const fs = Math.max(8, Math.round(sz * 0.32));

  // Place my team players
  onPitch.forEach((p,i)=>{
    const isGK = i===0;
    const color = isGK ? settings.myGkColor : settings.myColor;
    const label = tokenLabel(p, isGK);

    if(!pitchPlayerPositions[p.id]){
      const f = defaultFormations[format];
      pitchPlayerPositions[p.id] = {x:f.my[i]?.[0]??50, y:f.my[i]?.[1]??50};
    }
    const pos = pitchPlayerPositions[p.id];

    const el = document.createElement('div');
    el.className = 'player';
    el.dataset.pid = p.id;
    el.style.left = pos.x+'%';
    el.style.top  = pos.y+'%';

    const circle = document.createElement('div');
    circle.className = 'player-circle';
    circle.style.cssText = `width:${sz}px;height:${sz}px;background:${color};font-size:${fs}px;`;
    circle.textContent = label;

    const nameLabel = document.createElement('div');
    nameLabel.className = 'player-name-label';
    nameLabel.textContent = p.name;

    el.appendChild(circle);
    el.appendChild(nameLabel);
    pitch.appendChild(el);
    makeDraggable(el, np=>{ pitchPlayerPositions[p.id]={x:np.x,y:np.y}; saveState(); });
  });

  // Ensure opp positions exist for format
  const f = defaultFormations[format];
  while(oppPositions.length < format){
    const i = oppPositions.length;
    oppPositions.push({x:f.opp[i]?.[0]??50, y:f.opp[i]?.[1]??50});
  }

  // Place opposition players
  oppPositions.slice(0,format).forEach((pos,i)=>{
    const isGK = i===0;
    const color = isGK ? settings.oppGkColor : settings.oppColor;
    const label = isGK ? 'GK' : String(i+1);

    const el = document.createElement('div');
    el.className = 'player opp-player';
    el.style.left = pos.x+'%';
    el.style.top  = pos.y+'%';

    const circle = document.createElement('div');
    circle.className = 'player-circle';
    circle.style.cssText = `width:${sz}px;height:${sz}px;background:${color};font-size:${fs}px;`;
    circle.textContent = label;

    el.appendChild(circle);
    pitch.appendChild(el);
    makeDraggable(el, np=>{ oppPositions[i]={x:np.x,y:np.y}; saveState(); });
  });

  // Ball
  const ball = document.createElement('div');
  ball.className = 'ball-token';
  ball.style.left = ballPos.x+'%';
  ball.style.top  = ballPos.y+'%';
  ball.innerHTML = ballSVG(settings.ballColor, sz);
  pitch.appendChild(ball);
  makeDraggable(ball, np=>{ ballPos.x=np.x; ballPos.y=np.y; saveState(); });

  // Toggle opp visibility
  if(showMode==='mine') pitch.classList.add('opp-hidden');
  else pitch.classList.remove('opp-hidden');

  renderBench(bench);
}

function ballSVG(color, sz){
  const r = Math.round(sz*0.48);
  const d = r*2+4;
  const cx = d/2, cy = d/2;
  const isWhite = color.toLowerCase()==='#ffffff'||color.toLowerCase()==='#fff';
  const outline = isWhite ? '#333' : shadeColor(color,-60);
  const inner   = isWhite ? '#333' : shadeColor(color,-40);
  return `<svg width="${d}" height="${d}" viewBox="0 0 ${d} ${d}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="${outline}" stroke-width="1.2"/>
    <polygon points="${cx},${cy-r*0.6} ${cx+r*0.35},${cy-r*0.1} ${cx},${cy+r*0.3} ${cx-r*0.35},${cy-r*0.1}" fill="${inner}" opacity=".55"/>
    <polygon points="${cx},${cy+r*0.3} ${cx+r*0.35},${cy-r*0.1} ${cx+r*0.6},${cy+r*0.35}" fill="${inner}" opacity=".4"/>
    <polygon points="${cx},${cy+r*0.3} ${cx-r*0.35},${cy-r*0.1} ${cx-r*0.6},${cy+r*0.35}" fill="${inner}" opacity=".4"/>
  </svg>`;
}

// ─────────────────────────────────────────
// BENCH SIDEBAR
// ─────────────────────────────────────────
function renderBench(benchPlayers){
  const sidebar = document.getElementById('bench-tokens');
  sidebar.innerHTML = '';
  if(!benchPlayers||benchPlayers.length===0){
    sidebar.innerHTML = '';
    return;
  }
  benchPlayers.forEach(p=>{
    const tok = document.createElement('div');
    tok.className = 'bench-token';
    tok.style.background = settings.myColor;
    tok.style.marginBottom = '6px';
    tok.textContent = initials(p.name);
    tok.title = p.name+(p.number?` #${p.number}`:'');
    sidebar.appendChild(tok);
  });
}

// ─────────────────────────────────────────
// DRAG
// ─────────────────────────────────────────
function makeDraggable(el, onMove){
  let dragging=false, sx,sy,ol,ot;
  function coords(e){ return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }
  function start(e){
    e.preventDefault(); dragging=true;
    const c=coords(e); sx=c.x; sy=c.y;
    ol=parseFloat(el.style.left||0);
    ot=parseFloat(el.style.top||0);
    el.style.zIndex=200;
  }
  function move(e){
    if(!dragging)return; e.preventDefault();
    const c=coords(e);
    const pitch=document.getElementById('pitch');
    const rect=pitch.getBoundingClientRect();
    const dx=((c.x-sx)/rect.width)*100;
    const dy=((c.y-sy)/rect.height)*100;
    const nx=Math.max(2,Math.min(98,ol+dx));
    const ny=Math.max(2,Math.min(98,ot+dy));
    el.style.left=nx+'%'; el.style.top=ny+'%';
    onMove({x:nx,y:ny});
  }
  function end(){ dragging=false; el.style.zIndex=10; }
  el.addEventListener('touchstart',start,{passive:false});
  el.addEventListener('touchmove',move,{passive:false});
  el.addEventListener('touchend',end);
  el.addEventListener('mousedown',start);
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
}

// ─────────────────────────────────────────
// PLAYERS LIST + DRAG TO REORDER
// ─────────────────────────────────────────
let rowDragId = null;

function attachRowDrag(handle, row, pid){
  let startY, startIdx, isDragging = false;

  function getRows(){ return Array.from(document.querySelectorAll('#players-list .player-row')); }

  function getPlayerIndex(id){
    // find in the full players array
    return players.findIndex(p=>p.id===id);
  }

  function onStart(e){
    e.preventDefault();
    isDragging = false;
    rowDragId = pid;
    startY = e.touches ? e.touches[0].clientY : e.clientY;

    row.style.opacity = '0.5';
    row.style.transform = 'scale(1.02)';
    row.style.zIndex = '999';
    row.style.position = 'relative';
    row.style.transition = 'none';
  }

  function onMove(e){
    if(rowDragId !== pid) return;
    e.preventDefault();
    isDragging = true;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    // Find which row we're hovering over
    const allRows = getRows();
    const list = document.getElementById('players-list');
    const listRect = list.getBoundingClientRect();

    let targetRow = null;
    allRows.forEach(r => {
      if(r === row) return;
      const rect = r.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if(clientY >= rect.top && clientY <= rect.bottom){
        targetRow = r;
      }
    });

    // Highlight target
    allRows.forEach(r => r.style.borderColor = '');
    if(targetRow){
      targetRow.style.borderColor = '#4ade80';
    }
  }

  function onEnd(e){
    if(rowDragId !== pid){ return; }
    rowDragId = null;
    row.style.opacity = '';
    row.style.transform = '';
    row.style.zIndex = '';
    row.style.position = '';

    if(!isDragging){ return; }
    isDragging = false;

    const clientY = e.touches ? e.changedTouches[0].clientY : e.clientY;
    const allRows = getRows();

    let targetId = null;
    let insertBefore = false;
    allRows.forEach(r => {
      if(r === row) return;
      r.style.borderColor = '';
      const rect = r.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if(clientY >= rect.top && clientY <= rect.bottom){
        targetId = r.dataset.id;
        insertBefore = clientY < mid;
      }
    });

    if(targetId && targetId !== pid){
      const fromIdx = players.findIndex(p=>p.id===pid);
      const toIdx   = players.findIndex(p=>p.id===targetId);
      if(fromIdx !== -1 && toIdx !== -1){
        const [moved] = players.splice(fromIdx, 1);
        const newTo = players.findIndex(p=>p.id===targetId);
        const insertAt = insertBefore ? newTo : newTo+1;
        players.splice(insertAt, 0, moved);
        renderPlayersList();
        renderPitch();
      }
    }
  }

  handle.addEventListener('touchstart', onStart, {passive:false});
  handle.addEventListener('mousedown', onStart);
  window.addEventListener('touchmove', onMove, {passive:false});
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchend', onEnd);
  window.addEventListener('mouseup', onEnd);
}

function renderPlayersList(){
  const list = document.getElementById('players-list');
  list.innerHTML = '';

  const avail   = players.filter(p=>p.available);
  const unavail = players.filter(p=>!p.available);
  const ordered = [...avail,...unavail];

  if(ordered.length===0){
    list.innerHTML = '<div style="text-align:center;color:#556;padding:40px 16px;font-size:13px;">No players yet.<br>Tap \"+ Add Player\" to get started.</div>';
    return;
  }

  ordered.forEach((p)=>{
    const isOnPitch = avail.indexOf(p) < format && p.available;
    const row = document.createElement('div');
    row.className = 'player-row'+(p.available?'':' unavailable');
    row.dataset.id = p.id;

    const avTick = p.available ? '<span style="color:#000;font-size:11px;font-weight:700;">✓</span>' : '';
    const badge = isOnPitch
      ? '<span class="player-badge">STARTING</span>'
      : (p.available ? '<span class="player-badge" style="background:#1e2a3f;color:#778;">BENCH</span>' : '');

    row.innerHTML =
      '<div class="drag-handle" title="Hold and drag to reorder" style="cursor:grab;padding:4px 6px 4px 0;flex-shrink:0;">' +
        '<svg width="16" height="16" viewBox="0 0 16 16"><circle cx="5" cy="4" r="1.5" fill="#556"/><circle cx="11" cy="4" r="1.5" fill="#556"/><circle cx="5" cy="8" r="1.5" fill="#556"/><circle cx="11" cy="8" r="1.5" fill="#556"/><circle cx="5" cy="12" r="1.5" fill="#556"/><circle cx="11" cy="12" r="1.5" fill="#556"/></svg>' +
      '</div>' +
      '<div class="player-avail ' + (p.available?'checked':'') + '" data-id="' + p.id + '" title="Toggle availability">' + avTick + '</div>' +
      '<div class="player-avatar" style="background:' + (p.position==='GK'?settings.myGkColor:settings.myColor) + '">' + initials(p.name) + '</div>' +
      '<div class="player-info">' +
        '<div class="player-name">' + (p.name||'Unnamed') + ' ' + badge + '</div>' +
        '<div class="player-meta">' + (p.position||'?') + (p.number?' · #'+p.number:'') + '</div>' +
      '</div>' +
      '<div style="display:flex;gap:5px;">' +
        '<button class="edit-btn" data-id="' + p.id + '">Edit</button>' +
      '</div>';

    row.querySelector('.player-avail').addEventListener('click',()=>toggleAvail(p.id));
    row.querySelector('.edit-btn').addEventListener('click',()=>openModal(p.id));

    const handle = row.querySelector('.drag-handle');
    attachRowDrag(handle, row, p.id);

    list.appendChild(row);
  });
}

function toggleAvail(id){
  const p = players.find(x=>x.id===id);
  if(p) p.available = !p.available;
  renderPlayersList();
  renderPitch();
}

// ─────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────
function openModal(editId){
  editingPlayerId = editId||null;
  const modal = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const delBtn = document.getElementById('modal-delete');
  const nameIn = document.getElementById('modal-name');
  const posIn  = document.getElementById('modal-position');
  const numIn  = document.getElementById('modal-number');

  if(editId){
    const p = players.find(x=>x.id===editId);
    title.textContent = 'Edit Player';
    nameIn.value = p.name||'';
    posIn.value  = p.position||'FWD';
    numIn.value  = p.number||'';
    delBtn.style.display = 'block';
  } else {
    title.textContent = 'Add Player';
    nameIn.value=''; posIn.value='FWD'; numIn.value='';
    delBtn.style.display = 'none';
  }
  modal.classList.add('open');
  nameIn.focus();
}

document.getElementById('modal-cancel').addEventListener('click',()=>{
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-save').addEventListener('click',()=>{
  const name = document.getElementById('modal-name').value.trim()||'Player';
  const pos  = document.getElementById('modal-position').value;
  const num  = parseInt(document.getElementById('modal-number').value)||null;
  if(editingPlayerId){
    const p = players.find(x=>x.id===editingPlayerId);
    p.name=name; p.position=pos; p.number=num;
  } else {
    players.push({id:uid(),name,position:pos,number:num,available:true});
  }
  document.getElementById('modal-overlay').classList.remove('open');
  renderPlayersList(); renderPitch();
});
document.getElementById('modal-delete').addEventListener('click',()=>{
  if(editingPlayerId){
    players = players.filter(p=>p.id!==editingPlayerId);
    delete pitchPlayerPositions[editingPlayerId];
  }
  document.getElementById('modal-overlay').classList.remove('open');
  renderPlayersList(); renderPitch();
});

document.getElementById('add-player-fab').addEventListener('click',()=>openModal(null));

// ─────────────────────────────────────────
// SETTINGS
// ─────────────────────────────────────────
function initSettings(){
  function sw(id,key){
    const swEl = document.getElementById('sw-'+id);
    const cp = document.getElementById('cp-'+id);
    swEl.style.background = settings[key];
    cp.value = settings[key];
    cp.addEventListener('input',e=>{ settings[key]=e.target.value; swEl.style.background=e.target.value; saveState(); renderPitch(); if(['myColor','myGkColor'].includes(key)) renderPlayersList(); });
  }
  sw('my','myColor'); sw('mygk','myGkColor'); sw('opp','oppColor'); sw('oppgk','oppGkColor');
  sw('pitch','pitchColor'); sw('ball','ballColor');

  const tss = document.getElementById('token-size-select');
  tss.value = String(settings.tokenSize);
  tss.addEventListener('change',e=>{
    settings.tokenSize = parseInt(e.target.value); saveState(); renderPitch();
  });
}

document.querySelectorAll('.tab-btn').forEach(btn=>{

document.getElementById('both-btn').addEventListener('click',()=>{

document.querySelectorAll('.tt-btn').forEach(btn=>{

// ─────────────────────────────────────────
// PERSIST — save/load via localStorage
// ─────────────────────────────────────────
function saveState(){
  try {
    localStorage.setItem('tactics_players', JSON.stringify(players));
    localStorage.setItem('tactics_positions', JSON.stringify(pitchPlayerPositions));
    localStorage.setItem('tactics_opp', JSON.stringify(oppPositions));
    localStorage.setItem('tactics_ball', JSON.stringify(ballPos));
    localStorage.setItem('tactics_format', String(format));
    localStorage.setItem('tactics_settings', JSON.stringify(settings));
  } catch(e){}
}

function loadState(){
  try {
    const p = localStorage.getItem('tactics_players');
    if(p) players = JSON.parse(p);

    const pos = localStorage.getItem('tactics_positions');
    if(pos) pitchPlayerPositions = JSON.parse(pos);

    const opp = localStorage.getItem('tactics_opp');
    if(opp) oppPositions = JSON.parse(opp);

    const ball = localStorage.getItem('tactics_ball');
    if(ball) ballPos = JSON.parse(ball);

    const fmt = localStorage.getItem('tactics_format');
    if(fmt){ format = parseInt(fmt); document.getElementById('format-select').value = format; }

    const sett = localStorage.getItem('tactics_settings');
    if(sett) Object.assign(settings, JSON.parse(sett));
  } catch(e){}

  // If no saved players, load demo data
  if(!players || players.length === 0) loadDemoPlayers();
}

    {n:'Eli Ford',pos:'FWD',num:9},

}

// Patch render functions to auto-save after any change
const _origRenderPitch = renderPitch;
renderPitch = function(){ _origRenderPitch(); saveState(); };
const _origRenderPlayersList = renderPlayersList;
renderPlayersList = function(){ _origRenderPlayersList(); saveState(); };

// ─────────────────────────────────────────

loadState();
initSettings();
sizePitch();
renderPitch();

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
